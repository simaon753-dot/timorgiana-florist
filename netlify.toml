# =========================================================================
# Configuração Netlify — Timorgiana Florist (site estático)
# =========================================================================
[build]
  # O site é servido tal como está (sem passo de build).
  publish = "."

# Cabeçalhos de segurança e cache (opcional, mas recomendado)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache longo para imagens e tipos de letra (aceleram visitas seguintes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
